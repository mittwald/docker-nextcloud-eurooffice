name: build

# Baut das Image und published es nach GHCR.
on:
  push:
    branches: [main]
  schedule:
    # alle 12 Stunden (00:00 und 12:00 UTC)
    - cron: "0 */12 * * *"
  workflow_dispatch:

env:
  # Folgt dem offiziellen nextcloud:stable-apache (jeweils aktueller stabiler Major).
  NEXTCLOUD_VERSION: "stable"
  # SAPI-Variante. apache ist Default; fpm ließe sich als zweiter Build ergänzen.
  VARIANT: "apache"
  IMAGE: ghcr.io/mittwald/nextcloud-eurooffice

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Prüft, ob sich das Basis-Image hinter dem Tag geändert hat (auch wenn das
      # Tag gleich bleibt) bzw. ob das Image noch gar nicht existiert.
      - id: check
        uses: lucacome/docker-image-update-checker@v3
        with:
          base-image: nextcloud:${{ env.NEXTCLOUD_VERSION }}-${{ env.VARIANT }}
          image: ${{ env.IMAGE }}:stable-${{ env.VARIANT }}
          platforms: linux/amd64

      # Bei schedule nur bauen, wenn neu/fehlend; bei push/manuell immer
      # (Dockerfile/Hooks könnten sich geändert haben).
      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "schedule" ] \
             || [ "${{ steps.check.outputs.needs-updating }}" = "true" ] \
             || [ "${{ steps.check.outputs.needs-building }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Basis-Image unverändert – kein Build."
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - id: meta
        if: steps.decide.outputs.build == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=stable-${{ env.VARIANT }}
            type=raw,value=latest

      - if: steps.decide.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # immer das aktuelle Basis-Image ziehen (statt evtl. gecachtem)
          pull: true
          build-args: |
            NEXTCLOUD_VERSION=${{ env.NEXTCLOUD_VERSION }}
            NEXTCLOUD_VARIANT=${{ env.VARIANT }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: build

# Baut das Image und published es nach GHCR. Der schedule-Trigger zieht per
# `pull: true` jeweils das aktuelle nextcloud:<major>-apache nach, sodass neue
# Nextcloud-Releases (Patch/Minor des Majors) automatisch übernommen werden.
on:
  push:
    branches: [main]
  schedule:
    # täglich 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  # Nextcloud-Major, dem dieses Image folgt. Für einen Major-Sprung hier erhöhen.
  NEXTCLOUD_VERSION: "33"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.NEXTCLOUD_VERSION }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # immer das aktuelle Basis-Image ziehen (statt evtl. gecachtem)
          pull: true
          build-args: |
            NEXTCLOUD_VERSION=${{ env.NEXTCLOUD_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

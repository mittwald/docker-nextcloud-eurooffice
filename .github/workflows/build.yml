name: build

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

env:
  NEXTCLOUD_VERSION: "34"
  VARIANT: "apache"
  IMAGE: ghcr.io/mittwald/nextcloud-eurooffice

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: check
        uses: lucacome/docker-image-update-checker@v3
        with:
          base-image: nextcloud:${{ env.NEXTCLOUD_VERSION }}-${{ env.VARIANT }}
          image: ${{ env.IMAGE }}:stable-${{ env.VARIANT }}
          platforms: linux/amd64

      - id: decide
        run: |
          if [ "${{ github.event_name }}" != "schedule" ] \
             || [ "${{ steps.check.outputs.needs-updating }}" = "true" ] \
             || [ "${{ steps.check.outputs.needs-building }}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - id: ncver
        if: steps.decide.outputs.build == 'true'
        run: |
          major=$(docker run --rm --entrypoint sh \
            nextcloud:${{ env.NEXTCLOUD_VERSION }}-${{ env.VARIANT }} \
            -c 'php -r "include \"/usr/src/nextcloud/version.php\"; echo \$OC_VersionString;"' \
            | cut -d. -f1)
          echo "major=$major" >> "$GITHUB_OUTPUT"

      - id: meta
        if: steps.decide.outputs.build == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=stable-${{ env.VARIANT }}
            type=raw,value=${{ steps.ncver.outputs.major }}-${{ env.VARIANT }}
            type=raw,value=latest

      - if: steps.decide.outputs.build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          pull: true
          build-args: |
            NEXTCLOUD_VERSION=${{ env.NEXTCLOUD_VERSION }}
            NEXTCLOUD_VARIANT=${{ env.VARIANT }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

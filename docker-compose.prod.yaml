# Prod behind a TLS-terminating reverse proxy. Provide via .env:
# NEXTCLOUD_DOMAIN, NEXTCLOUD_ADMIN_USER, NEXTCLOUD_ADMIN_PASSWORD,
# MYSQL_PASSWORD, MYSQL_ROOT_PASSWORD, EUROOFFICE_DOMAIN,
# EUROOFFICE_JWT_SECRET (min. 32 chars), optional OVERWRITEHOST/TRUSTED_PROXIES.
# The proxy routes NEXTCLOUD_DOMAIN -> nextcloud-app, EUROOFFICE_DOMAIN -> eurooffice.

services:
  nextcloud-app:
    image: ghcr.io/mittwald/nextcloud-eurooffice:stable-apache
    restart: unless-stopped
    expose:
      - "80"
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_DOMAIN} nextcloud-app
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://${NEXTCLOUD_DOMAIN}
      OVERWRITEHOST: ${OVERWRITEHOST:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: nextcloud-redis
      EUROOFFICE_DOMAIN: https://${EUROOFFICE_DOMAIN}
      EUROOFFICE_JWT_SECRET: ${EUROOFFICE_JWT_SECRET}
      EUROOFFICE_INTERNAL_URL: http://eurooffice
      NEXTCLOUD_INTERNAL_URL: http://nextcloud-app
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started
    volumes:
      - nextcloud-app:/var/www/html

  nextcloud-db:
    image: mariadb:lts
    restart: unless-stopped
    command: >-
      --transaction-isolation=READ-COMMITTED
      --binlog-format=ROW
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_DATABASE: nextcloud
      MARIADB_USER: nextcloud
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - nextcloud-db:/var/lib/mysql

  nextcloud-redis:
    image: redis:8-alpine
    restart: unless-stopped

  eurooffice:
    image: ghcr.io/euro-office/documentserver:latest
    restart: unless-stopped
    expose:
      - "80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${EUROOFFICE_JWT_SECRET}
      JWT_HEADER: Authorization
      EXAMPLE_ENABLED: "false"

volumes:
  nextcloud-app:
  nextcloud-db:

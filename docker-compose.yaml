services:
  app:
    image: ghcr.io/mittwald/nextcloud-eurooffice:stable-apache
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: demo-db-password
      REDIS_HOST: redis
      EUROOFFICE_JWT_SECRET: demo-secret-change-me
      EUROOFFICE_INTERNAL_URL: http://eurooffice
      NEXTCLOUD_INTERNAL_URL: http://app
    depends_on:
      - db
      - redis
    volumes:
      - nextcloud:/var/www/html

  db:
    image: mariadb:12
    restart: unless-stopped
    command: >-
      --transaction-isolation=READ-COMMITTED
      --binlog-format=ROW
    environment:
      MARIADB_DATABASE: nextcloud
      MARIADB_USER: nextcloud
      MARIADB_PASSWORD: demo-db-password
      MARIADB_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - db:/var/lib/mysql

  redis:
    image: redis:8-alpine
    restart: unless-stopped

  eurooffice:
    image: ghcr.io/euro-office/documentserver:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: demo-secret-change-me
      JWT_HEADER: Authorization

volumes:
  nextcloud:
  db:
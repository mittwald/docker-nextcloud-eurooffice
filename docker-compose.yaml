services:
  app:
    image: ghcr.io/mittwald/nextcloud-eurooffice:stable-apache
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      REDIS_HOST: redis
      EUROOFFICE_JWT_SECRET: demo-secret-change-me
      EUROOFFICE_INTERNAL_URL: http://eurooffice
      NEXTCLOUD_INTERNAL_URL: http://app
    depends_on:
      - redis
    volumes:
      - nextcloud:/var/www/html

  redis:
    image: redis:8-alpine
    restart: unless-stopped

  eurooffice:
    image: ghcr.io/euro-office/documentserver:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: demo-secret-change-me
      JWT_HEADER: Authorization

volumes:
  nextcloud:

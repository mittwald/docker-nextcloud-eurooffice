services:
  nextcloud-app:
    image: ghcr.io/mittwald/nextcloud-eurooffice:stable-apache
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost nextcloud-app
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: demo-db-password
      REDIS_HOST: nextcloud-redis
      EUROOFFICE_DOMAIN: http://localhost:8081
      EUROOFFICE_JWT_SECRET: demo-jwt-secret-change-me-0123456789
      EUROOFFICE_INTERNAL_URL: http://eurooffice
      NEXTCLOUD_INTERNAL_URL: http://nextcloud-app
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started
    volumes:
      - nextcloud-app:/var/www/html

  nextcloud-db:
    image: mariadb:lts
    restart: unless-stopped
    command: >-
      --transaction-isolation=READ-COMMITTED
      --binlog-format=ROW
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_DATABASE: nextcloud
      MARIADB_USER: nextcloud
      MARIADB_PASSWORD: demo-db-password
      MARIADB_RANDOM_ROOT_PASSWORD: "1"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - nextcloud-db:/var/lib/mysql

  nextcloud-redis:
    image: redis:8-alpine
    restart: unless-stopped

  eurooffice:
    image: ghcr.io/euro-office/documentserver:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: demo-jwt-secret-change-me-0123456789
      JWT_HEADER: Authorization
      EXAMPLE_ENABLED: "false"

volumes:
  nextcloud-app:
  nextcloud-db:
